id: integration-eku
version: 1.0

rules:
  - id: leaf-has-server-auth
    reference: integration-test
    target: certificate
    operator: ekuContains
    operands: ["serverAuth"]
    certType: [leaf]
    severity: error
    message: "Leaf certificate must contain serverAuth EKU"

  - id: leaf-no-client-auth
    reference: integration-test
    target: certificate
    operator: ekuNotContains
    operands: ["clientAuth"]
    certType: [leaf]
    severity: warning
    message: "Leaf certificate must not contain clientAuth EKU"

  - id: server-auth-valid
    reference: integration-test
    target: certificate
    operator: ekuServerAuth
    certType: [leaf]
    severity: error
    message: "Certificate must be valid for server authentication"
