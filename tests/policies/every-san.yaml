id: integration-every-san
version: 1.0

rules:
  - id: san-dns-all-match-domain
    reference: integration-test
    when:
      target: certificate.subjectAltName.dNSName
      operator: present
    target: certificate.subjectAltName.dNSName
    operator: every
    operands:
      - operator: regex
        operands: [".*\\.example\\.test$"]
    certType: [leaf]
    severity: error
    message: "Every SAN DNS name must end in .example.test"
